# Graphium + Crucible — full setup (editor + AI + MCP tools)
#
# Graphium runs with built-in AI backend (Vercel AI SDK).
# Crucible Registry provides MCP server management with auto-discovery.
#
# For the editor-only setup without AI, use:
#   docker compose -f docker-compose.standalone.yml up -d
#
# Usage:
#   docker compose up -d
#   http://localhost:5174/Graphium/   — Graphium editor (includes AI setup)
#
# Advanced:
#   http://localhost:8080             — Crucible Registry API
#   http://localhost:8081             — Crucible Registry UI

services:
  # ============================================================================
  # Graphium — PROV-DM editor + AI backend (frontend + Node.js API)
  # ============================================================================
  graphium:
    build:
      context: .
    ports:
      - "5174:3001"
    volumes:
      - graphium_data:/app/data
    environment:
      - PORT=3001
      - DATA_DIR=/app/data
      - SERVE_STATIC=dist
      - CRUCIBLE_API_URL=http://crucible-api:8000
      - CRUCIBLE_API_KEY=${CRUCIBLE_API_KEY:-}
      # Server-side note storage (auto-enabled when DATA_DIR is writable).
      # Set GRAPHIUM_AUTH_TOKEN to require X-Graphium-Token on all storage requests.
      - GRAPHIUM_AUTH_TOKEN=${GRAPHIUM_AUTH_TOKEN:-}
    depends_on:
      - crucible-api
    restart: unless-stopped

  # ============================================================================
  # Crucible Registry API — MCP server management
  # ============================================================================
  crucible-api:
    image: ghcr.io/kumagallium/crucible-api:latest
    ports:
      - "${CRUCIBLE_API_PORT:-8080}:8000"
    environment:
      - REGISTRY_FILE=/var/lib/crucible-registry/servers.json
      - DOCKER_HOST=tcp://socket-proxy:2375
      - MCP_NETWORK=${COMPOSE_PROJECT_NAME:-graphium}_default
      - REGISTRY_API_KEY=${CRUCIBLE_API_KEY:-}
      - CRUCIBLE_HOST=127.0.0.1
      - CRUCIBLE_HEALTH_HOST=host.docker.internal
      - CRUCIBLE_BASE_URL=http://localhost
      - CRUCIBLE_CORS_ORIGINS=http://localhost:8081,http://localhost:5174
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
    volumes:
      - crucible_data:/var/lib/crucible-registry
    depends_on:
      - socket-proxy
    networks:
      - default
      - socket_proxy_net
    restart: unless-stopped

  # ============================================================================
  # Crucible Registry UI — MCP server dashboard
  # ============================================================================
  crucible-ui:
    image: ghcr.io/kumagallium/crucible-ui:latest
    ports:
      - "${CRUCIBLE_UI_PORT:-8081}:3000"
    environment:
      - API_BASE_URL=http://crucible-api:8000
      - REGISTRY_API_KEY=${CRUCIBLE_API_KEY:-}
    depends_on:
      - crucible-api
    restart: unless-stopped

  # ============================================================================
  # Docker socket proxy — raw socket 公開を防ぐセキュリティレイヤー
  # ============================================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      BUILD: 1
      POST: 1
      DELETE: 1
    networks:
      - socket_proxy_net
    restart: unless-stopped

volumes:
  graphium_data:
  crucible_data:

networks:
  default:
    driver: bridge
  socket_proxy_net:
    internal: true
