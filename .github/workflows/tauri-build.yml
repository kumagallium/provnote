name: Tauri Desktop Build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build (e.g. v0.3.1)"
        required: true

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.resolve.outputs.release_id }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release ID
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release?.tag_name || '${{ inputs.release_tag }}';
            core.setOutput('tag', tag);
            if (context.payload.release?.id) {
              core.setOutput('release_id', context.payload.release.id);
              return;
            }
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            core.setOutput('release_id', release.id);

  # Currently macOS Apple Silicon only.
  # Windows / Linux / Intel macOS were dropped in v0.3.8 because the bundled
  # sidecar (Node.js runtime) only ships for arm64 macOS, and the developer
  # has no realistic way to verify other platforms' release builds end-to-end.
  # See ideas: G-MULTIOS-RESUME for the conditions to bring them back.
  build:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Bundle Node.js runtime for sidecar
        run: node scripts/fetch-node.mjs

      - name: Bundle server
        run: node scripts/bundle-server.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Apple Developer ID code-signing & notarization (macOS only).
          # tauri-action imports APPLE_CERTIFICATE (base64 .p12) into a temp
          # keychain, signs with APPLE_SIGNING_IDENTITY, and submits the bundle
          # to the notarization service using APPLE_ID + APPLE_PASSWORD
          # (app-specific) under APPLE_TEAM_ID.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.resolve-release.outputs.release_id }}
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

  # 全ビルド完了後、リリースアセットをダウンロードして署名 → latest.json 生成
  generate-updater-json:
    needs: [resolve-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Download updater assets and sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          TAG="${{ needs.resolve-release.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"

          mkdir -p /tmp/assets

          # macOS Apple Silicon only — see build job comment for rationale
          ASSETS=(
            "Graphium_aarch64.app.tar.gz"
          )

          for ASSET in "${ASSETS[@]}"; do
            echo "Downloading $ASSET..."
            gh release download "$TAG" --pattern "$ASSET" --dir /tmp/assets --repo "$REPO" --clobber 2>/dev/null || {
              echo "WARNING: $ASSET not found, skipping"
              continue
            }

            echo "Signing $ASSET..."
            tauri signer sign "/tmp/assets/$ASSET" -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" 2>&1 || echo "WARNING: signing failed for $ASSET"
          done

          echo "Signatures generated:"
          ls -la /tmp/assets/*.sig 2>/dev/null || echo "No signatures"

          echo "Signatures generated:"
          ls -la /tmp/assets/*.minisig 2>/dev/null || echo "No signatures"

      - name: Build latest.json
        run: |
          set -e
          TAG="${{ needs.resolve-release.outputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          read_sig() {
            local file="/tmp/assets/$1.sig"
            if [ -f "$file" ]; then
              cat "$file"
            fi
          }

          DARWIN_AARCH64_SIG=$(read_sig "Graphium_aarch64.app.tar.gz")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE_URL}/Graphium_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-release.outputs.tag }}"
          gh release upload "$TAG" latest.json --clobber --repo "${{ github.repository }}"
