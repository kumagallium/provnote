name: Tauri Desktop Build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build (e.g. v0.3.1)"
        required: true

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.resolve.outputs.release_id }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release ID
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release?.tag_name || '${{ inputs.release_tag }}';
            core.setOutput('tag', tag);
            if (context.payload.release?.id) {
              core.setOutput('release_id', context.payload.release.id);
              return;
            }
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            core.setOutput('release_id', release.id);

  build:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-14
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create sidecar wrapper (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          SRC="src-tauri/binaries/graphium-server-aarch64-apple-darwin"
          DST="src-tauri/binaries/graphium-server-${{ matrix.target }}"
          if [ "$SRC" != "$DST" ]; then
            cp "$SRC" "$DST"
          fi
          chmod +x "$DST"

      - name: Create sidecar wrapper (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $content = @"
          @echo off
          set SCRIPT_DIR=%~dp0
          node "%SCRIPT_DIR%..\sidecar\server.mjs" %*
          "@
          Set-Content -Path "src-tauri\binaries\graphium-server-${{ matrix.target }}.exe" -Value $content

      - name: Bundle server
        run: node scripts/bundle-server.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          VITE_GOOGLE_DESKTOP_CLIENT_SECRET: ${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
        with:
          releaseId: ${{ needs.resolve-release.outputs.release_id }}
          includeUpdaterJson: false
          args: --target ${{ matrix.target }}

  # 全ビルド完了後、リリースアセットをダウンロードして署名 → latest.json 生成
  generate-updater-json:
    needs: [resolve-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Download updater assets and sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          TAG="${{ needs.resolve-release.outputs.tag }}"
          REPO="${{ github.repository }}"

          # 秘密鍵をデコードしてファイルに書き出し（Node.js でシェル問題を回避）
          node -e "require('fs').writeFileSync('/tmp/signing.key', Buffer.from(process.env.TAURI_SIGNING_PRIVATE_KEY, 'base64'))"
          echo "Key file size: $(wc -c < /tmp/signing.key) bytes"
          echo "Key file first line: $(head -1 /tmp/signing.key)"

          mkdir -p /tmp/assets

          # 署名対象ファイルをダウンロード
          ASSETS=(
            "Graphium_aarch64.app.tar.gz"
            "Graphium_x64.app.tar.gz"
          )

          # バージョン番号付きアセット
          VERSION="${TAG#v}"
          ASSETS+=(
            "Graphium_${VERSION}_amd64.AppImage"
            "Graphium_${VERSION}_x64-setup.exe"
          )

          for ASSET in "${ASSETS[@]}"; do
            echo "Downloading $ASSET..."
            gh release download "$TAG" --pattern "$ASSET" --dir /tmp/assets --repo "$REPO" --clobber 2>/dev/null || {
              echo "WARNING: $ASSET not found, skipping"
              continue
            }

            echo "Signing $ASSET..."
            minisign -S -W -s /tmp/signing.key -m "/tmp/assets/$ASSET" || echo "WARNING: signing failed for $ASSET"
          done

          # 秘密鍵を削除
          rm -f /tmp/signing.key

          echo "Signatures generated:"
          ls -la /tmp/assets/*.minisig 2>/dev/null || echo "No signatures"

      - name: Build latest.json
        run: |
          set -e
          TAG="${{ needs.resolve-release.outputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          read_sig() {
            local file="/tmp/assets/$1.minisig"
            if [ -f "$file" ]; then
              cat "$file"
            fi
          }

          DARWIN_AARCH64_SIG=$(read_sig "Graphium_aarch64.app.tar.gz")
          DARWIN_X64_SIG=$(read_sig "Graphium_x64.app.tar.gz")
          LINUX_SIG=$(read_sig "Graphium_${VERSION}_amd64.AppImage")
          WINDOWS_SIG=$(read_sig "Graphium_${VERSION}_x64-setup.exe")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE_URL}/Graphium_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "${BASE_URL}/Graphium_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/Graphium_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/Graphium_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-release.outputs.tag }}"
          gh release upload "$TAG" latest.json --clobber --repo "${{ github.repository }}"
